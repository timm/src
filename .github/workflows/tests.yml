name: tests
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  eg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: timm/moot
          path: moot
      - run: |
          sudo apt-get update -q
          sudo apt-get install -y sbcl lua5.4
          sudo ln -sf /usr/bin/lua5.4 /usr/local/bin/lua
      - run: make eg
        env:
          MOOT: ${{ github.workspace }}/moot
