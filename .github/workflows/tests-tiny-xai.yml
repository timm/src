name: tiny-xai
on:
  push:
    branches: [main]
    paths:
      - "tiny-xai/**"
      - ".github/workflows/tests-tiny-xai.yml"
  workflow_dispatch:
jobs:
  eg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: timm/moot
          path: moot
      - run: sudo apt-get update -q && sudo apt-get install -y sbcl
      - run: cd tiny-xai && sbcl --script tiny-xai-eg.lisp --all
        env:
          MOOT: ${{ github.workspace }}/moot
