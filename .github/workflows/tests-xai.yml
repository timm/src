name: xai
on:
  push:
    branches: [main]
    paths:
      - "xai/**"
      - ".github/workflows/tests-xai.yml"
  workflow_dispatch:
jobs:
  eg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: timm/moot
          path: moot
      - run: |
          sudo apt-get update -q
          sudo apt-get install -y lua5.4
          sudo ln -sf /usr/bin/lua5.4 /usr/local/bin/lua
      - run: cd xai && lua xai-eg.lua --all
        env:
          MOOT: ${{ github.workspace }}/moot
      - run: cd xai && lua xai-eg.lua --join
      - run: cd xai && lua xai-eg.lua --check
        env:
          MOOT: ${{ github.workspace }}/moot
